naftiko: "1.0.0-alpha1"
info:
  label: "OpenAI Images"
  description: "Images API for creating, editing, and generating variations of images using DALL-E."
  tags:
    - OpenAI
    - Images
    - DALL-E
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
    - type: http
      namespace: openai-images
      baseUri: https://api.openai.com/v1
      description: "OpenAI Images API."
      authentication:
        type: bearer
        token: "{{OPENAI_API_KEY}}"
      resources:
        - name: images
          path: /images
          description: "Image generation and editing operations"
          operations:
            - name: create-image
              method: POST
              description: "Creates an image given a text prompt."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  prompt: "{{tools.prompt}}"
                  model: "{{tools.model}}"
                  n: "{{tools.n}}"
                  size: "{{tools.size}}"
            - name: create-image-edit
              method: POST
              description: "Creates an edited or extended image given an original image and a prompt."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  image: "{{tools.image}}"
                  prompt: "{{tools.prompt}}"
            - name: create-image-variation
              method: POST
              description: "Creates a variation of a given image."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  image: "{{tools.image}}"
  exposes:
    - type: rest
      port: 8101
      namespace: openai-images-api
      resources:
        - path: /v1/images/generations
          name: generations
          description: "Image generation endpoint"
          operations:
            - method: POST
              name: create-image
              description: "Create an image"
              call: "openai-images.create-image"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9101
      namespace: openai-images-mcp
      transport: http
      tools:
        - name: create-image
          description: "Generate an image from a text prompt using DALL-E"
          hints:
            readOnly: false
          call: "openai-images.create-image"
          with:
            prompt: "tools.prompt"
            model: "tools.model"
            n: "tools.n"
            size: "tools.size"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-image-edit
          description: "Edit an image with a text prompt"
          hints:
            readOnly: false
          call: "openai-images.create-image-edit"
          with:
            image: "tools.image"
            prompt: "tools.prompt"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-image-variation
          description: "Create a variation of an image"
          hints:
            readOnly: false
          call: "openai-images.create-image-variation"
          with:
            image: "tools.image"
          outputParameters:
            - type: object
              mapping: "$."
