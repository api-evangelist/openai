naftiko: "1.0.0-alpha1"
info:
  label: "OpenAI Audio"
  description: "Audio API for text-to-speech synthesis, speech-to-text transcription, and translation."
  tags:
    - OpenAI
    - Audio
    - Speech
  created: "2026-04-18"
  modified: "2026-04-18"
binds:
  - namespace: env
    keys:
      OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
    - type: http
      namespace: openai-audio
      baseUri: https://api.openai.com/v1
      description: "OpenAI Audio API."
      authentication:
        type: bearer
        token: "{{OPENAI_API_KEY}}"
      resources:
        - name: audio
          path: /audio
          description: "Audio operations"
          operations:
            - name: create-speech
              method: POST
              description: "Generates audio from the input text."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  input: "{{tools.input}}"
                  voice: "{{tools.voice}}"
            - name: create-transcription
              method: POST
              description: "Transcribes audio into the input language."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  file: "{{tools.file}}"
                  model: "{{tools.model}}"
            - name: create-translation
              method: POST
              description: "Translates audio into English."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  file: "{{tools.file}}"
                  model: "{{tools.model}}"
  exposes:
    - type: rest
      port: 8102
      namespace: openai-audio-api
      resources:
        - path: /v1/audio/speech
          name: speech
          description: "Text-to-speech endpoint"
          operations:
            - method: POST
              name: create-speech
              description: "Generate speech from text"
              call: "openai-audio.create-speech"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9102
      namespace: openai-audio-mcp
      transport: http
      tools:
        - name: create-speech
          description: "Generate audio from text using TTS models"
          hints:
            readOnly: false
          call: "openai-audio.create-speech"
          with:
            model: "tools.model"
            input: "tools.input"
            voice: "tools.voice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-transcription
          description: "Transcribe audio to text using Whisper"
          hints:
            readOnly: false
          call: "openai-audio.create-transcription"
          with:
            file: "tools.file"
            model: "tools.model"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-translation
          description: "Translate audio to English text"
          hints:
            readOnly: false
          call: "openai-audio.create-translation"
          with:
            file: "tools.file"
            model: "tools.model"
          outputParameters:
            - type: object
              mapping: "$."
