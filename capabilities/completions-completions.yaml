naftiko: 1.0.0-alpha2
info:
  label: OpenAI Completions — Completions
  description: 'OpenAI Completions — Completions. 1 operations. Lead operation: OpenAI Creates a completion for the provided
    prompt and parameters.. Self-contained Naftiko capability covering one Openai business surface.'
  tags:
  - Openai
  - Completions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: completions-completions
    baseUri: https://api.openai.com/v1
    description: OpenAI Completions — Completions business capability. Self-contained, no shared references.
    resources:
    - name: completions
      path: /completions
      operations:
      - name: createcompletion
        method: POST
        description: OpenAI Creates a completion for the provided prompt and parameters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: completions-completions-rest
    port: 8080
    description: REST adapter for OpenAI Completions — Completions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/completions
      name: completions
      description: REST surface for completions.
      operations:
      - method: POST
        name: createcompletion
        description: OpenAI Creates a completion for the provided prompt and parameters.
        call: completions-completions.createcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: completions-completions-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI Completions — Completions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: openai-creates-completion-provided-prompt
      description: OpenAI Creates a completion for the provided prompt and parameters.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: completions-completions.createcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
