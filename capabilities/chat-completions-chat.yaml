naftiko: 1.0.0-alpha2
info:
  label: OpenAI Chat Completions API — Chat
  description: 'OpenAI Chat Completions API — Chat. 1 operations. Lead operation: Openai Create Chat Completion. Self-contained
    Naftiko capability covering one Openai business surface.'
  tags:
  - Openai
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: chat-completions-chat
    baseUri: https://api.openai.com/v1
    description: OpenAI Chat Completions API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: Openai Create Chat Completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: chat-completions-chat-rest
    port: 8080
    description: REST adapter for OpenAI Chat Completions API — Chat. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: createchatcompletion
        description: Openai Create Chat Completion
        call: chat-completions-chat.createchatcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chat-completions-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI Chat Completions API — Chat. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: openai-create-chat-completion
      description: Openai Create Chat Completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-completions-chat.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
