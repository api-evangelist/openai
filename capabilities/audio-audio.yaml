naftiko: 1.0.0-alpha2
info:
  label: OpenAI Audio API — Audio
  description: 'OpenAI Audio API — Audio. 3 operations. Lead operation: Openai Create Speech. Self-contained Naftiko capability
    covering one Openai business surface.'
  tags:
  - Openai
  - Audio
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_API_KEY: OPENAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: audio-audio
    baseUri: https://api.openai.com/v1
    description: OpenAI Audio API — Audio business capability. Self-contained, no shared references.
    resources:
    - name: audio-speech
      path: /audio/speech
      operations:
      - name: createspeech
        method: POST
        description: Openai Create Speech
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: audio-transcriptions
      path: /audio/transcriptions
      operations:
      - name: createtranscription
        method: POST
        description: Openai Create Transcription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: audio-translations
      path: /audio/translations
      operations:
      - name: createtranslation
        method: POST
        description: Openai Create Translation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_API_KEY}}'
  exposes:
  - type: rest
    namespace: audio-audio-rest
    port: 8080
    description: REST adapter for OpenAI Audio API — Audio. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/audio/speech
      name: audio-speech
      description: REST surface for audio-speech.
      operations:
      - method: POST
        name: createspeech
        description: Openai Create Speech
        call: audio-audio.createspeech
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audio/transcriptions
      name: audio-transcriptions
      description: REST surface for audio-transcriptions.
      operations:
      - method: POST
        name: createtranscription
        description: Openai Create Transcription
        call: audio-audio.createtranscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audio/translations
      name: audio-translations
      description: REST surface for audio-translations.
      operations:
      - method: POST
        name: createtranslation
        description: Openai Create Translation
        call: audio-audio.createtranslation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: audio-audio-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI Audio API — Audio. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: openai-create-speech
      description: Openai Create Speech
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: audio-audio.createspeech
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-transcription
      description: Openai Create Transcription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: audio-audio.createtranscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-translation
      description: Openai Create Translation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: audio-audio.createtranslation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
