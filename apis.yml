  - aid: openai:openai-responses-api
    name: OpenAI Responses API
    tags:
      - Responses
      - Agents
      - Text Generation
    score: 150
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/responses
    properties:
      - url: https://platform.openai.com/docs/api-reference/responses
        type: Documentation
      - url: https://platform.openai.com/docs/guides/text
        type: Documentation
      - url: https://developers.openai.com/api/docs/guides/deep-research/
        type: Documentation
      - url: https://developers.openai.com/api/docs/guides/conversation-state/
        type: Documentation
    description: >-
      The Responses API is OpenAI's most advanced interface for generating model
      responses. It combines the strengths of the Chat Completions and Assistants
      APIs into a single streamlined interface, supporting text and image inputs,
      text outputs, and built-in tools like web search, file search, computer use,
      and code interpreter. Recommended for all new projects.
  - aid: openai:openai-moderations-api
    name: OpenAI Moderations API
    tags:
      - Moderation
      - Content Safety
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/moderations
    properties:
      - url: https://platform.openai.com/docs/api-reference/moderations
        type: Documentation
      - url: https://platform.openai.com/docs/guides/moderation
        type: Documentation
    description: >-
      The Moderations API can be used to check whether text or images are
      potentially harmful. It classifies content across several categories
      including harassment, hate speech, sexual content, self-harm, violence,
      and illicit content. The moderation endpoint is free to use and supports
      the omni-moderation-latest model for multi-modal inputs.
  - aid: openai:openai-batch-api
    name: OpenAI Batch API
    tags:
      - Batch
      - Async
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/batch
    properties:
      - url: https://platform.openai.com/docs/api-reference/batch
        type: Documentation
      - url: https://platform.openai.com/docs/guides/batch
        type: Documentation
    description: >-
      The Batch API enables asynchronous processing of requests with 50% cost
      discount, higher rate limits, and completion within 24 hours. It supports
      /v1/responses, /v1/chat/completions, /v1/embeddings, /v1/completions,
      and /v1/moderations endpoints. A single batch may include up to 50,000
      requests with a batch input file size up to 200 MB.
  - aid: openai:openai-vector-stores-api
    name: OpenAI Vector Stores API
    tags:
      - Vector Stores
      - Search
      - Retrieval
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/vector-stores
    properties:
      - url: https://platform.openai.com/docs/api-reference/vector-stores
        type: Documentation
      - url: https://platform.openai.com/docs/guides/retrieval
        type: Documentation
    description: >-
      Vector stores are collections of processed files that power semantic search
      for the file_search tool in the Responses and Assistants APIs. When you add
      a file to a vector store it is automatically chunked, embedded, and indexed.
      You can query a vector store using natural language to retrieve relevant
      chunks with similarity scores.
  - aid: openai:openai-uploads-api
    name: OpenAI Uploads API
    tags:
      - Uploads
      - Files
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/uploads
    properties:
      - url: https://platform.openai.com/docs/api-reference/uploads
        type: Documentation
    description: >-
      The Uploads API creates an intermediate Upload object that you can add
      Parts to, enabling large file uploads. Currently an Upload can accept
      at most 8 GB in total and expires after an hour. Once you complete the
      Upload, a File object is created that can be used across the platform.
  - aid: openai:openai-realtime-api
    name: OpenAI Realtime API
    tags:
      - Realtime
      - Audio
      - Streaming
      - Voice
    score: 150
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/realtime
    properties:
      - url: https://platform.openai.com/docs/api-reference/realtime
        type: Documentation
      - url: https://platform.openai.com/docs/guides/realtime
        type: Documentation
      - url: https://platform.openai.com/docs/guides/realtime-webrtc
        type: Documentation
      - url: https://platform.openai.com/docs/guides/realtime-server-controls
        type: Documentation
      - url: 
          https://developers.openai.com/api/docs/guides/realtime-conversations/
        type: Documentation
    description: >-
      The Realtime API enables low-latency, bidirectional communication with
      models that natively support speech-to-speech interactions as well as
      multimodal inputs (audio, images, and text) and outputs (audio and text).
      It supports WebRTC, WebSocket, and SIP connection methods for real-time
      voice agents and conversational interfaces.
  - aid: openai:openai-evals-api
    name: OpenAI Evals API
    tags:
      - Evals
      - Evaluation
      - Testing
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/evals
    properties:
      - url: https://platform.openai.com/docs/api-reference/evals
        type: Documentation
      - url: https://platform.openai.com/docs/guides/evals
        type: Documentation
    description: >-
      The Evals API allows you to programmatically configure and run evaluations
      to test model outputs against your expectations. Evaluations ensure model
      responses meet style and content criteria you specify, and are essential
      for building reliable LLM applications, especially when upgrading or
      trying new models.
  - aid: openai:openai-completions-api
    name: OpenAI Completions API
    tags:
      - Completions
      - Legacy
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/completions
    properties:
      - url: https://platform.openai.com/docs/api-reference/completions
        type: Documentation
      - url: openapi/completions-openapi-original.yml
        type: OpenAPI
    description: >-
      The legacy Completions API endpoint provides a freeform text completion
      interface using a text prompt. Unlike the Chat Completions endpoint which
      uses a list of messages, the Completions API input is a freeform text
      string called a prompt. This endpoint received its last update in July
      2023.
  - aid: openai:openai-videos-api
    name: OpenAI Videos API
    tags:
      - Videos
      - Video Generation
      - Sora
    score: 150
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/videos
    properties:
      - url: https://platform.openai.com/docs/api-reference/videos
        type: Documentation
      - url: https://platform.openai.com/docs/guides/video-generation
        type: Documentation
    description: >-
      The Videos API enables programmatic creation, extension, and remixing of
      videos using Sora models. It provides endpoints for creating a new render
      job from a text prompt, checking video status, downloading finished MP4
      files, listing videos with pagination, and deleting videos from storage.
      Supported models include sora-2 and sora-2-pro.
  - aid: openai:openai-conversations-api
    name: OpenAI Conversations API
    tags:
      - Conversations
      - State Management
    score: 100
    baseURL: https://api.openai.com
    humanURL: 
      https://platform.openai.com/docs/api-reference/conversations/create
    properties:
      - url: https://platform.openai.com/docs/api-reference/conversations/create
        type: Documentation
      - url: https://developers.openai.com/api/docs/guides/conversation-state/
        type: Documentation
    description: >-
      The Conversations API allows you to create and manage stateful
      conversations for use with the Responses API. A conversation object
      contains an id, a created_at timestamp, and metadata. Because
      conversations are stateful, managing context across conversations is
      handled automatically, and the /responses/compact endpoint can shrink
      context for long-running conversations.
  - aid: openai:openai-containers-api
    name: OpenAI Containers API
    tags:
      - Containers
      - Code Interpreter
      - Sandbox
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/containers
    properties:
      - url: https://platform.openai.com/docs/api-reference/containers
        type: Documentation
      - url: https://platform.openai.com/docs/api-reference/container-files
        type: Documentation
      - url: 
          https://developers.openai.com/api/docs/guides/tools-code-interpreter/
        type: Documentation
    description: >-
      The Containers API manages sandboxed containers used by Code Interpreter
      for running Python, data work, file transforms, and iterative debugging.
      Containers can be created explicitly or auto-managed, with configurable
      memory limits of 1g, 4g, 16g, or 64g. Container files can be uploaded,
      listed, retrieved, and downloaded. Containers expire after 20 minutes of
      inactivity.
  - aid: openai:openai-chatkit-api
    name: OpenAI ChatKit API
    tags:
      - ChatKit
      - Chat
      - Agents
    score: 100
    baseURL: https://api.openai.com
    humanURL: https://platform.openai.com/docs/api-reference/chatkit
    properties:
      - url: https://platform.openai.com/docs/api-reference/chatkit
        type: Documentation
      - url: https://platform.openai.com/docs/guides/chatkit
        type: Documentation
    description: >-
      ChatKit is the best way to build agentic chat experiences. It provides
      session and thread management for building internal knowledge base
      assistants, research companions, support agents, and more. ChatKit
      sessions include resolved feature configuration for automatic thread
      titling, file upload, and history settings. Threads have statuses
      including active, locked, and closed.
